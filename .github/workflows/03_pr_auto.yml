# Raciocinio: automatiza abertura e atualizacao de PR para reduzir operacao manual no fluxo de entrega.

name: Auto PR Pipeline (Reusable)

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do código para ter acesso aos arquivos
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Lógica de decisão: define qual será a branch de destino (base) do PR
      - name: Define base branch
        id: branch
        run: |
          if [[ "${GITHUB_REF_NAME}" == feature/* ]]; then
            echo "base=develop" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "base=main" >> $GITHUB_OUTPUT
          else
            echo "Branch não suportada"
            exit 1
          fi

      # 3. Gerenciamento do Pull Request via CLI do GitHub (gh)
      - name: Create or Update PR
        run: |
          BASE=${{ steps.branch.outputs.base }}
          HEAD=${{ github.ref_name }}

          PR_BODY="## Auto PR: \`$HEAD\` → \`$BASE\`

**Commit:** \`$GITHUB_SHA\`
**Workflow:** [$GITHUB_RUN_ID]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)"

          PR_NUMBER=$(gh pr list --base "$BASE" --head "$HEAD" --json number --jq '.[0].number // ""')

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --base "$BASE" \
              --head "$HEAD" \
              --title "Auto PR: $HEAD → $BASE" \
              --body "$PR_BODY"
          else
            gh pr edit "$PR_NUMBER" \
              --title "Auto PR: $HEAD → $BASE" \
              --body "$PR_BODY"
            echo "PR já existente: #$PR_NUMBER"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
