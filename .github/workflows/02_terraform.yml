# Raciocinio: centraliza plan/apply/destroy do Terraform com parametros por ambiente.

name: "Terraform (Reusable)"

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
    outputs:
      was_destroyed:
        description: "Indica se a infraestrutura foi destruída"
        value: ${{ jobs.terraform.outputs.destroyed_status }}
    secrets:
      aws-assume-role-arn:
        required: true
      aws-statefile-s3-bucket:
        required: true
      aws-lock-dynamodb-table:
        required: true
      aws-tmdb-secret-arn:
        required: true
      infracost-api-key:
        required: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    outputs:
      destroyed_status: ${{ steps.read-destroy-config.outputs.destroy }}

    defaults:
      run:
        shell: bash

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instala a versão específica do CLI do Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.3

      # 3. Autenticação na AWS usando OIDC — evita chaves fixas (Access Keys)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws-assume-role-arn }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: sa-east-1

      # 4. Build do pacote Lambda antes do plan
      # O data "archive_file" é avaliado durante o plan e exige que .lambda_build exista.
      - name: Build Lambda Package
        run: |
          python infra/scripts/build_lambda_package.py \
            --src app/lambda_api \
            --requirements app/lambda_api/requirements.txt \
            --dest infra/.lambda_build

      # 5. Cache dos providers do Terraform para acelerar o init
      - name: Cache Terraform Providers
        uses: actions/cache@v4
        with:
          path: infra/.terraform
          key: terraform-${{ hashFiles('infra/.terraform.lock.hcl') }}
          restore-keys: terraform-

      # 6. Verifica se o ambiente deve ser destruído ou criado
      - name: Read destroy configuration
        id: read-destroy-config
        run: |
          DESTROY="$(jq -r '.${{ inputs.environment }}' ./infra/destroy_config.json)"
          echo "destroy=$(echo $DESTROY)" >> $GITHUB_OUTPUT

      # 7. Inicializa o Terraform configurando o Backend Remoto dinamicamente
      - name: Terraform Init
        run: |
          cd infra && terraform init \
            -backend-config="bucket=${{ secrets.aws-statefile-s3-bucket }}" \
            -backend-config="key=${{ github.event.repository.name }}" \
            -backend-config="region=sa-east-1" \
            -backend-config="dynamodb_table=${{ secrets.aws-lock-dynamodb-table }}"

      # 8. Valida se a sintaxe do código Terraform está correta
      - name: Terraform Validate
        run: cd infra && terraform validate

      # 9. TFLint — detecção de má prática e erros potenciais
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          cd infra
          tflint --init
          tflint --format compact || echo "Avisos de TFLint detectados (verificar antes de deploy)"

      # 10. Format Check — verifica se o código está formatado corretamente
      - name: Terraform Format Check
        run: |
          cd infra
          terraform fmt -check -recursive || {
            echo "Codigo nao formatado. Execute: terraform fmt -recursive"
            exit 0
          }

      # 11. Checkov — validação de segurança e compliance
      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          quiet: true
          soft_fail: true
          output_format: cli

      # 12. Operação de DESTROY (executada apenas se a flag no JSON for 'true')
      - name: Terraform Destroy
        if: steps.read-destroy-config.outputs.destroy == 'true'
        id: terraform-destroy
        run: |
          cd infra
          terraform destroy -var-file="./envs/${{ inputs.environment }}/terraform.tfvars" \
            -var="tmdb_secret_arn=${{ secrets.aws-tmdb-secret-arn }}" \
            -auto-approve

      # 13. Planejamento: gera o plano e salva em arquivo binário para garantir consistência no apply
      - name: Terraform Plan
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: terraform-plan
        run: |
          cd infra
          terraform plan -var-file="./envs/${{ inputs.environment }}/terraform.tfvars" \
            -var="tmdb_secret_arn=${{ secrets.aws-tmdb-secret-arn }}" \
            -out="${{ inputs.environment }}.plan"

      # 14. Infracost — estimativa de custo da infraestrutura
      - name: Setup Infracost
        if: steps.read-destroy-config.outputs.destroy != 'true'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.infracost-api-key }}

      - name: Generate Terraform Plan JSON
        if: steps.read-destroy-config.outputs.destroy != 'true'
        run: cd infra && terraform show -json ${{ inputs.environment }}.plan > /tmp/plan.json

      - name: Infracost Breakdown
        if: steps.read-destroy-config.outputs.destroy != 'true'
        run: |
          infracost breakdown \
            --path /tmp/plan.json \
            --format json \
            --out-file /tmp/infracost.json

          echo "## Estimativa de Custo (Infracost) — ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          infracost output --path /tmp/infracost.json --format table >> $GITHUB_STEP_SUMMARY

      # 15. Execução: aplica as mudanças planejadas no passo anterior
      - name: Terraform Apply
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: terraform-apply
        run: |
          cd infra
          terraform apply "${{ inputs.environment }}.plan"
