name: "4. Deploy Lightsail (Reusable)"

# =============================================================================
# Deploy do app configurado (nome/pasta em infra/config/project.json) na
# instância AWS Lightsail. Chamado pelo 00_pipeline.yml apenas em prod, após
# o Terraform aplicar com sucesso.
#
# Etapas principais:
#   1. Lê os outputs do Terraform (IP público, chave SSH, credenciais AWS do agente)
#   2. Aguarda a instância ficar disponível via SSH (até 30 tentativas, 10s cada)
#   3. Cria .env com credenciais na instância (sem passar por /tmp)
#   4. Clona ou atualiza o repositório e reinicia o serviço systemd do app
#
# Ambientes:
#   dev  → deploy da branch "develop"
#   prod → deploy da branch "main"
# =============================================================================

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
    secrets:
      aws-assume-role-arn:
        required: true
      aws-statefile-s3-bucket:
        required: true
      aws-lock-dynamodb-table:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ler configuração do projeto
        id: project
        run: |
          CONFIG=infra/config/project.json
          echo "statefile_key=$(jq -r '.statefile_key' $CONFIG)" >> $GITHUB_OUTPUT
          echo "app_name=$(jq -r '.app_name' $CONFIG)" >> $GITHUB_OUTPUT
          echo "app_display_name=$(jq -r '.app_display_name' $CONFIG)" >> $GITHUB_OUTPUT
          echo "app_folder=$(jq -r '.app_folder' $CONFIG)" >> $GITHUB_OUTPUT

      # terraform_wrapper: false necessário para ler outputs como texto puro
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.3
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws-assume-role-arn }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: sa-east-1

      - name: Terraform Init
        run: |
          cd infra && terraform init \
            -backend-config="bucket=${{ secrets.aws-statefile-s3-bucket }}" \
            -backend-config="key=${{ steps.project.outputs.statefile_key }}" \
            -backend-config="region=sa-east-1" \
            -backend-config="dynamodb_table=${{ secrets.aws-lock-dynamodb-table }}"

      - name: Get Terraform Outputs
        id: tf
        run: |
          cd infra

          PUBLIC_IP=$(terraform output -raw lightsail_public_ip)
          echo "public_ip=${PUBLIC_IP}" >> $GITHUB_OUTPUT
          echo "lightsail_enabled=$([[ -n "$PUBLIC_IP" ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

          INSTANCE_NAME=$(terraform output -raw lightsail_instance_name)
          echo "instance_name=${INSTANCE_NAME}" >> $GITHUB_OUTPUT

          if [ -z "$PUBLIC_IP" ]; then
            echo "⚠ Lightsail desabilitado — IP público vazio (instância não provisionada)"
            exit 0
          fi

          KEY_FILE=$(mktemp)
          terraform output -raw lightsail_private_key > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          echo "key_file=${KEY_FILE}" >> $GITHUB_OUTPUT
          if [ ! -s "$KEY_FILE" ]; then
            echo "❌ Chave SSH privada está vazia — verificar output lightsail_private_key"
            exit 1
          fi

          ACCESS_KEY_ID=$(terraform output -raw lightsail_agent_access_key_id)
          echo "::add-mask::${ACCESS_KEY_ID}"
          echo "access_key_id=${ACCESS_KEY_ID}" >> $GITHUB_OUTPUT
          if [ -z "$ACCESS_KEY_ID" ]; then
            echo "❌ Access Key ID está vazio — verificar output lightsail_agent_access_key_id"
            exit 1
          fi

          SECRET_ACCESS_KEY=$(terraform output -raw lightsail_agent_secret_access_key)
          echo "::add-mask::${SECRET_ACCESS_KEY}"
          echo "secret_access_key=${SECRET_ACCESS_KEY}" >> $GITHUB_OUTPUT
          if [ -z "$SECRET_ACCESS_KEY" ]; then
            echo "❌ Secret Access Key está vazio — verificar output lightsail_agent_secret_access_key"
            exit 1
          fi

          CW_LOG_GROUP=$(terraform output -raw lightsail_cloudwatch_log_group)
          echo "cw_log_group=${CW_LOG_GROUP}" >> $GITHUB_OUTPUT

          FILMBOT_SECRET_ARN=$(terraform output -raw lightsail_filmbot_secret_arn)
          echo "::add-mask::${FILMBOT_SECRET_ARN}"
          echo "filmbot_secret_arn=${FILMBOT_SECRET_ARN}" >> $GITHUB_OUTPUT

          ATHENA_S3_OUTPUT=$(terraform output -raw lightsail_athena_s3_output)
          echo "athena_s3_output=${ATHENA_S3_OUTPUT}" >> $GITHUB_OUTPUT

          GLUE_DATABASE=$(terraform output -raw lightsail_glue_database)
          echo "glue_database=${GLUE_DATABASE}" >> $GITHUB_OUTPUT

          SPEC_TABLE=$(terraform output -raw lightsail_spec_table)
          echo "spec_table=${SPEC_TABLE}" >> $GITHUB_OUTPUT

          echo "✅ Terraform outputs lidos com sucesso (IP: $PUBLIC_IP)"

      - name: Check instance state
        if: steps.tf.outputs.lightsail_enabled == 'true'
        id: instance_check
        run: |
          STATE=$(aws lightsail get-instance \
            --instance-name "${{ steps.tf.outputs.instance_name }}" \
            --region us-east-1 \
            --query 'instance.state.name' \
            --output text)
          echo "Lightsail instance state: $STATE"
          if [ "$STATE" == "running" ]; then
            echo "instance_running=true" >> $GITHUB_OUTPUT
            echo "✅ Instância está rodando — prosseguindo com deploy"
          else
            echo "instance_running=false" >> $GITHUB_OUTPUT
            echo "::warning::Instância está '$STATE' — deploy será ignorado"
          fi

      # chmod 600 obrigatório — SSH rejeita chaves com permissões mais abertas
      - name: Setup SSH key
        if: steps.tf.outputs.lightsail_enabled == 'true' && steps.instance_check.outputs.instance_running == 'true'
        run: |
          mkdir -p ~/.ssh
          cp "${{ steps.tf.outputs.key_file }}" ~/.ssh/${{ steps.project.outputs.app_name }}_key
          chmod 600 ~/.ssh/${{ steps.project.outputs.app_name }}_key
          SSH_READY=0
          for i in $(seq 1 30); do
            ssh-keyscan -T 5 -H "${{ steps.tf.outputs.public_ip }}" >> ~/.ssh/known_hosts 2>/dev/null && { SSH_READY=1; break; }
            echo "Tentativa $i/30 — aguardando SSH..."
            sleep 10
          done
          if [ $SSH_READY -eq 0 ]; then
            echo "❌ SSH indisponível após 5 minutos — abortando."
            exit 1
          fi
          echo "✅ SSH disponível após $((i * 10))s (tentativa $i/30)"

      # Credenciais criadas diretamente no destino final (não em /tmp — world-readable)
      - name: Create .env file on instance
        if: steps.tf.outputs.lightsail_enabled == 'true' && steps.instance_check.outputs.instance_running == 'true'
        run: |
          printf 'AWS_ACCESS_KEY_ID=%s\nAWS_SECRET_ACCESS_KEY=%s\nAWS_REGION=sa-east-1\nFILMBOT_SECRET_ARN=%s\nATHENA_S3_OUTPUT=%s\nGLUE_DATABASE=%s\nSPEC_TABLE=%s\nCLOUDWATCH_LOG_GROUP=%s\n' \
            "${{ steps.tf.outputs.access_key_id }}" \
            "${{ steps.tf.outputs.secret_access_key }}" \
            "${{ steps.tf.outputs.filmbot_secret_arn }}" \
            "${{ steps.tf.outputs.athena_s3_output }}" \
            "${{ steps.tf.outputs.glue_database }}" \
            "${{ steps.tf.outputs.spec_table }}" \
            "${{ steps.tf.outputs.cw_log_group }}" \
            | ssh -i ~/.ssh/${{ steps.project.outputs.app_name }}_key ubuntu@${{ steps.tf.outputs.public_ip }} \
                "sudo mkdir -p /opt/${{ steps.project.outputs.app_name }}/app/${{ steps.project.outputs.app_folder }} && sudo tee /opt/${{ steps.project.outputs.app_name }}/app/${{ steps.project.outputs.app_folder }}/.env > /dev/null && sudo chmod 600 /opt/${{ steps.project.outputs.app_name }}/app/${{ steps.project.outputs.app_folder }}/.env"
          ssh -i ~/.ssh/${{ steps.project.outputs.app_name }}_key ubuntu@${{ steps.tf.outputs.public_ip }} \
            "test -s /opt/${{ steps.project.outputs.app_name }}/app/${{ steps.project.outputs.app_folder }}/.env" || { echo "❌ Arquivo .env não foi criado na instância"; exit 1; }
          echo "✅ Arquivo .env criado com sucesso na instância"

      - name: Deploy app
        if: steps.tf.outputs.lightsail_enabled == 'true' && steps.instance_check.outputs.instance_running == 'true'
        run: |
          # dev → clona/atualiza branch "develop" | prod → branch "main"
          DEPLOY_BRANCH=${{ inputs.environment == 'dev' && 'develop' || 'main' }}
          ssh -i ~/.ssh/${{ steps.project.outputs.app_name }}_key ubuntu@${{ steps.tf.outputs.public_ip }} \
            BRANCH="$DEPLOY_BRANCH" \
            APP_NAME="${{ steps.project.outputs.app_name }}" \
            APP_FOLDER="${{ steps.project.outputs.app_folder }}" \
            REPO_URL="https://github.com/${{ github.repository }}.git" \
            bash << 'ENDSSH'
            set -e
            sudo apt-get update -q && sudo apt-get install -y python3-venv python3-pip git debian-keyring debian-archive-keyring apt-transport-https curl -q
            sudo useradd -m "$APP_NAME" || true

            # Instalar Caddy (proxy reverso HTTPS) se ainda não instalado
            if ! command -v caddy &> /dev/null; then
              curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
              curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
              sudo apt-get update -q && sudo apt-get install -y caddy -q
            fi

            APP_DIR="/opt/$APP_NAME"

            if [ -d "$APP_DIR/.git" ]; then
              echo "==> Atualizando código existente (branch: $BRANCH)..."
              sudo git config --global --add safe.directory "$APP_DIR"
              cd "$APP_DIR"
              sudo git fetch origin
              sudo git checkout "$BRANCH"
              sudo git pull origin "$BRANCH"
              sudo chown -R "$APP_NAME:$APP_NAME" "$APP_DIR"
              sudo chown "$APP_NAME:$APP_NAME" "$APP_DIR/app/$APP_FOLDER/.env"
              cd "$APP_DIR/app/$APP_FOLDER"
              sudo python3 -m venv .venv
              sudo .venv/bin/pip install --upgrade pip -q
              sudo .venv/bin/pip install -r requirements.txt -q
              sudo cp "deploy/$APP_NAME.service" "/etc/systemd/system/$APP_NAME.service"
              sudo cp deploy/caddy.service /etc/systemd/system/caddy.service
              sudo systemctl daemon-reload
              sudo systemctl enable "$APP_NAME" caddy
              sudo systemctl restart "$APP_NAME" caddy
            else
              echo "==> Primeiro deploy (branch: $BRANCH)..."
              sudo git clone -b "$BRANCH" "$REPO_URL" "/tmp/${APP_NAME}_new"
              sudo cp -rn "/tmp/${APP_NAME}_new/." "$APP_DIR/"
              sudo rm -rf "/tmp/${APP_NAME}_new"
              sudo git config --global --add safe.directory "$APP_DIR"
              sudo chown -R "$APP_NAME:$APP_NAME" "$APP_DIR"
              sudo chown "$APP_NAME:$APP_NAME" "$APP_DIR/app/$APP_FOLDER/.env"
              cd "$APP_DIR/app/$APP_FOLDER"
              sudo python3 -m venv .venv
              sudo .venv/bin/pip install --upgrade pip -q
              sudo .venv/bin/pip install -r requirements.txt -q
              sudo cp "$APP_DIR/app/$APP_FOLDER/deploy/$APP_NAME.service" "/etc/systemd/system/$APP_NAME.service"
              sudo cp "$APP_DIR/app/$APP_FOLDER/deploy/caddy.service" /etc/systemd/system/caddy.service
              sudo systemctl daemon-reload
              sudo systemctl enable "$APP_NAME" caddy
              sudo systemctl restart "$APP_NAME" caddy
            fi
            sudo systemctl status "$APP_NAME" --no-pager
            sudo systemctl status caddy --no-pager

            if sudo systemctl is-active --quiet "$APP_NAME" && sudo systemctl is-active --quiet caddy; then
              echo "✅ Serviços $APP_NAME e caddy ativos"
            else
              echo "❌ Um ou mais serviços não estão ativos:"
              sudo systemctl is-active "$APP_NAME" || echo "   - $APP_NAME: inativo"
              sudo systemctl is-active caddy || echo "   - caddy: inativo"
              exit 1
            fi
          ENDSSH
          echo "✅ Deploy concluído com sucesso na instância ${{ steps.tf.outputs.public_ip }}"

      - name: Health Check
        if: steps.tf.outputs.lightsail_enabled == 'true' && steps.instance_check.outputs.instance_running == 'true'
        run: |
          APP_OK=0
          for i in $(seq 1 6); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${{ steps.tf.outputs.public_ip }}" || true)
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "✅ Health check OK — HTTP $HTTP_CODE após $((i * 5))s (tentativa $i/6)"
              APP_OK=1
              break
            fi
            echo "Tentativa $i/6 — HTTP $HTTP_CODE, aguardando 5s..."
            sleep 5
          done
          if [ $APP_OK -eq 0 ]; then
            echo "⚠ Health check retornou HTTP $HTTP_CODE após 30s — app pode ainda estar iniciando"
          fi

      - name: Show app URL
        if: steps.tf.outputs.lightsail_enabled == 'true'
        run: |
          echo "🔗 ${{ steps.project.outputs.app_display_name }}: http://${{ steps.tf.outputs.public_ip }}"
          echo "## 🔗 ${{ steps.project.outputs.app_display_name }}" >> $GITHUB_STEP_SUMMARY
          echo "http://${{ steps.tf.outputs.public_ip }}" >> $GITHUB_STEP_SUMMARY
