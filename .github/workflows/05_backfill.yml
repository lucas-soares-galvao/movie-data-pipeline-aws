name: 5. Backfill
run-name: "Backfill [${{ github.ref_name == 'main' && 'PROD' || 'DEV' }}]: ${{ inputs.table_group }} (${{ inputs.start_year }}-${{ inputs.end_year != '' && inputs.end_year || 'atual' }})"

# =============================================================================
# Executa backfills pontuais sob demanda.
#
# O ambiente (dev/prod) é resolvido automaticamente a partir do branch
# selecionado em "Use workflow from" ao disparar o workflow:
#   - main    → prod
#   - develop → dev
#   - qualquer outro branch → falha (ver step "Resolver ambiente a partir do branch")
#
# Grupos de tabelas disponíveis:
#   - discover              — gaps de anos via Lambda (ETL → DQ → Details → AGG)
#   - referencias           — genre, configuration, watch_providers_ref via Lambda
#   - detalhes_e_providers  — re-enriquece details + watch_providers via Glue Details
#   - data_quality          — re-executa DQ via Glue
#   - traducao              — adiciona overview_pt nos details (sem API TMDB)
#
# Todas as variáveis de ambiente dos recursos AWS são derivadas automaticamente
# do padrão de nomenclatura do Terraform (tmdb-*-<env> / db_tmdb_*_<env> / etc.).
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      table_group:
        description: "Grupo de tabelas a atualizar"
        required: true
        type: choice
        options:
          - discover
          - referencias
          - detalhes_e_providers
          - data_quality
          - traducao
      start_year:
        description: "Ano inicial (ignorado para referencias)"
        required: true
        default: "2000"
        type: string
      end_year:
        description: "Ano final (vazio = ano atual; ignorado para referencias)"
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolver ambiente a partir do branch
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "develop" ]; then
            echo "name=dev" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Branch '${{ github.ref_name }}' inválido — dispare este workflow a partir de 'main' (prod) ou 'develop' (dev)."
            exit 1
          fi
          echo "🌎 Ambiente resolvido a partir do branch '${{ github.ref_name }}'"

      - name: Ler configuração do projeto
        id: project
        run: |
          echo "project_prefix=$(jq -r '.project_prefix' infra/config/project.json)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.env.outputs.name == 'prod' && secrets.AWS_ASSUME_ROLE_ARN_BACKFILL_PROD || secrets.AWS_ASSUME_ROLE_ARN_BACKFILL_DEV }}
          role-session-name: GitHub_to_AWS_Backfill
          aws-region: sa-east-1
          # Sessão padrão de 1h (default da action). Backfills históricos podem
          # rodar por horas e a sessão expira antes do fim — em vez de esticar
          # a duração, o step "Executar backfill" abaixo trata
          # ExpiredTokenException especificamente: renova a credencial (nova
          # sessão de 1h via OIDC) e retoma o script do checkpoint em S3, sem
          # perder o progresso já feito (ver scripts/backfill_shared.py).

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install boto3
          if [ "${{ inputs.table_group }}" = "traducao" ]; then
            pip install -r scripts/requirements_backfill.txt
          fi

      - name: Executar backfill (${{ inputs.table_group }})
        env:
          AWS_REGION: sa-east-1
          FORCE_REFETCH: "true"
          TABLE_GROUP: ${{ inputs.table_group }}

          # Role para renovar a credencial via OIDC se ExpiredTokenException ocorrer no meio do backfill
          ROLE_ARN: ${{ steps.env.outputs.name == 'prod' && secrets.AWS_ASSUME_ROLE_ARN_BACKFILL_PROD || secrets.AWS_ASSUME_ROLE_ARN_BACKFILL_DEV }}

          # Jobs
          GLUE_DETAILS_JOB_NAME: ${{ steps.project.outputs.project_prefix }}-glue-details-${{ steps.env.outputs.name }}
          GLUE_DATA_QUALITY_JOB_NAME: ${{ steps.project.outputs.project_prefix }}-glue-data-quality-${{ steps.env.outputs.name }}
          LAMBDA_FUNCTION_NAME: ${{ steps.project.outputs.project_prefix }}-lambda-api-${{ steps.env.outputs.name }}

          # Databases
          GLUE_DATABASE_MOVIE: db_${{ steps.project.outputs.project_prefix }}_movie_${{ steps.env.outputs.name }}
          GLUE_DATABASE_TV: db_${{ steps.project.outputs.project_prefix }}_tv_${{ steps.env.outputs.name }}
          GLUE_DATABASE_UNIFIED: db_${{ steps.project.outputs.project_prefix }}_unified_${{ steps.env.outputs.name }}

          # Buckets
          # SOT: parquets reais de discover/details (só backfill_traducao.py)
          # TEMP: checkpoint de retomada de todos os 4 scripts que iteram por ano
          S3_BUCKET_SOT: lsg-sa-east-1-bucket-sot-${{ steps.env.outputs.name }}
          S3_BUCKET_TEMP: lsg-sa-east-1-bucket-temp-${{ steps.env.outputs.name }}

          # Tabelas
          TABLE_DISCOVER_MOVIE: tb_${{ steps.project.outputs.project_prefix }}_discover_movie_${{ steps.env.outputs.name }}
          TABLE_DISCOVER_TV: tb_${{ steps.project.outputs.project_prefix }}_discover_tv_${{ steps.env.outputs.name }}
          TABLE_GENRE_MOVIE: tb_${{ steps.project.outputs.project_prefix }}_genre_movie_${{ steps.env.outputs.name }}
          TABLE_GENRE_TV: tb_${{ steps.project.outputs.project_prefix }}_genre_tv_${{ steps.env.outputs.name }}
          TABLE_CONFIGURATION_LANGUAGES: tb_${{ steps.project.outputs.project_prefix }}_configuration_languages_${{ steps.env.outputs.name }}
          TABLE_CONFIGURATION_COUNTRIES: tb_${{ steps.project.outputs.project_prefix }}_configuration_countries_${{ steps.env.outputs.name }}
          TABLE_DETAILS_MOVIE: tb_${{ steps.project.outputs.project_prefix }}_details_movie_${{ steps.env.outputs.name }}
          TABLE_DETAILS_TV: tb_${{ steps.project.outputs.project_prefix }}_details_tv_${{ steps.env.outputs.name }}
          TABLE_WATCH_PROVIDERS_MOVIE: tb_${{ steps.project.outputs.project_prefix }}_watch_providers_movie_${{ steps.env.outputs.name }}
          TABLE_WATCH_PROVIDERS_TV: tb_${{ steps.project.outputs.project_prefix }}_watch_providers_tv_${{ steps.env.outputs.name }}
          TABLE_WATCH_PROVIDERS_REF_MOVIE: tb_${{ steps.project.outputs.project_prefix }}_watch_providers_ref_movie_${{ steps.env.outputs.name }}
          TABLE_WATCH_PROVIDERS_REF_TV: tb_${{ steps.project.outputs.project_prefix }}_watch_providers_ref_tv_${{ steps.env.outputs.name }}
          BACKFILL_START_YEAR: ${{ inputs.start_year }}
        run: |
          if [ -n "${{ inputs.end_year }}" ]; then
            export BACKFILL_END_YEAR="${{ inputs.end_year }}"
          fi

          executar_script() {
            case "${{ inputs.table_group }}" in
              discover)             python scripts/backfill_historico.py ;;
              referencias)          python scripts/backfill_referencias.py ;;
              detalhes_e_providers) python scripts/backfill_enriquecimento.py ;;
              data_quality)         python scripts/backfill_data_quality.py ;;
              traducao)             python scripts/backfill_traducao.py ;;
            esac
          }

          # Re-assume a role via OIDC (mesma mecânica de aws-actions/configure-aws-credentials,
          # inline para poder repetir a cada tentativa) e exporta uma sessão nova de 1h.
          renovar_credenciais() {
            echo "Token expirado — renovando credenciais AWS (nova sessão de 1h via OIDC)..."
            oidc_token=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
            creds=$(aws sts assume-role-with-web-identity \
              --role-arn "$ROLE_ARN" \
              --role-session-name GitHub_to_AWS_Backfill \
              --web-identity-token "$oidc_token" \
              --duration-seconds 3600 \
              --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
              --output text)
            export AWS_ACCESS_KEY_ID=$(echo "$creds" | cut -f1)
            export AWS_SECRET_ACCESS_KEY=$(echo "$creds" | cut -f2)
            export AWS_SESSION_TOKEN=$(echo "$creds" | cut -f3)
          }

          # Nota: backfill_referencias.py não itera por ano, não grava checkpoint e nunca
          # sai com código 75 — para ele, este loop roda uma única vez e sai normalmente.
          # max_tentativas alinhado ao timeout-minutes do job (360min / ~1h por sessão AWS) —
          # se o timeout mudar, ajustar aqui também.
          max_tentativas=6
          tentativa=1
          while true; do
            echo "Tentativa $tentativa/$max_tentativas..."
            # set +e/-e: sob "set -e" (padrão dos steps run: do GitHub Actions), um
            # exit code != 0 de executar_script derruba o script aqui mesmo, antes de
            # "codigo=$?" rodar — o retry abaixo nunca seria alcançado.
            set +e
            executar_script
            codigo=$?
            set -e
            if [ $codigo -eq 0 ]; then
              echo "Backfill concluído com sucesso."
              break
            elif [ $codigo -eq 75 ] && [ $tentativa -lt $max_tentativas ]; then
              tentativa=$((tentativa + 1))
              renovar_credenciais
            else
              echo "Backfill falhou (código $codigo)."
              exit $codigo
            fi
          done
