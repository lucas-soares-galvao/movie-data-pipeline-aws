# Raciocinio: orquestra a esteira CI/CD chamando workflows reutilizaveis em ordem controlada.

name: Pipeline CI/CD

on:
  push:
    branches: [feature/*, develop, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente de deploy (dev, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read
  actions: write
  pull-requests: write

jobs:

  # Resolve o ambiente alvo uma única vez, evitando ternários aninhados nos demais jobs
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "develop" ]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          else
            echo "environment=prod" >> $GITHUB_OUTPUT
          fi

  # Job de Testes: executa em paralelo com resolve-env
  test:
    uses: ./.github/workflows/01_test.yml

  # Job de Terraform: realiza o deploy da infraestrutura
  terraform:
    needs: [test, resolve-env]
    if: |
      (github.ref_name == 'develop' || github.ref_name == 'main' || github.event_name == 'workflow_dispatch') &&
      needs.test.result == 'success'
    uses: ./.github/workflows/02_terraform.yml
    with:
      environment: ${{ needs.resolve-env.outputs.environment }}
    secrets:
      aws-assume-role-arn: ${{ needs.resolve-env.outputs.environment == 'dev' && secrets.AWS_ASSUME_ROLE_ARN_DEV || secrets.AWS_ASSUME_ROLE_ARN_PROD }}
      aws-statefile-s3-bucket: ${{ needs.resolve-env.outputs.environment == 'dev' && secrets.AWS_STATEFILE_S3_BUCKET_DEV || secrets.AWS_STATEFILE_S3_BUCKET_PROD }}
      aws-lock-dynamodb-table: ${{ needs.resolve-env.outputs.environment == 'dev' && secrets.AWS_LOCK_DYNAMODB_TABLE_DEV || secrets.AWS_LOCK_DYNAMODB_TABLE_PROD }}
      aws-tmdb-secret-arn: ${{ needs.resolve-env.outputs.environment == 'dev' && secrets.AWS_TMDB_SECRET_ARN_DEV || secrets.AWS_TMDB_SECRET_ARN_PROD }}
      infracost-api-key: ${{ secrets.INFRACOST_API_KEY }}

  # Auto PR para Feature: promove feature/* → develop após testes passarem
  auto-pr-feature:
    needs: test
    if: |
      startsWith(github.ref_name, 'feature/') &&
      needs.test.result == 'success'
    uses: ./.github/workflows/03_pr_auto.yml
    permissions:
      contents: write
      pull-requests: write

  # Auto PR para Ambientes: promove develop → main após infra aplicada com sucesso
  auto-pr-environment:
    needs: [terraform]
    if: |
      github.ref_name == 'develop' &&
      needs.terraform.result == 'success'
    uses: ./.github/workflows/03_pr_auto.yml
    permissions:
      contents: write
      pull-requests: write
