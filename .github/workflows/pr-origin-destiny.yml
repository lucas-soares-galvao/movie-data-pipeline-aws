- name: Checkout
  uses: actions/checkout@v4
  with:
    fetch-depth: 0 # Necessário para baixar o histórico e comparar as branches

# ... (mantenha seu step de Define base branch e Terraform aqui)

# 🔀 Criar ou atualizar PR com validação de commits
- name: Create or Update PR (Retry)
  run: |
    BASE=${{ steps.branch.outputs.base }}
    HEAD=${{ inputs.github-ref-name }}
    
    # 1. Garantir que as referências locais existam para comparação
    git fetch origin $BASE --quiet
    git fetch origin $HEAD --quiet

    # 2. Verificar se há commits entre HEAD e BASE
    # O comando rev-list conta quantos commits a HEAD tem a mais que a BASE
    COMMITS_AHEAD=$(git rev-list --count origin/$BASE..origin/$HEAD)

    if [ "$COMMITS_AHEAD" -eq "0" ]; then
      echo "✅ Nenhuma diferença encontrada entre $HEAD e $BASE. Pulando criação de PR."
      exit 0
    fi

    echo "🚀 Detectados $COMMITS_AHEAD commits novos. Iniciando processo de PR..."

    RETRIES=3
    COUNT=0

    while [ $COUNT -lt $RETRIES ]; do
      EXISTING_PR=$(gh pr list --base "$BASE" --head "$HEAD" --json number --jq '.[0].number // ""')

      if [ -z "$EXISTING_PR" ]; then
        echo "No existing PR, creating..."
        # Capturamos a saída e o erro para tratar casos específicos
        if gh pr create --base "$BASE" --head "$HEAD" --title "Auto PR: $HEAD → $BASE" --body "PR criado automaticamente."; then
          echo "PR criado com sucesso!"
          break
        fi
      else
        echo "PR já existe: #$EXISTING_PR, atualizando..."
        if gh pr edit "$EXISTING_PR" --title "Auto PR: $HEAD → $BASE" --body "PR atualizado automaticamente."; then
          echo "PR atualizado com sucesso!"
          break
        fi
      fi

      COUNT=$((COUNT+1))
      echo "Falha na tentativa $((COUNT)). Tentando novamente em 5s..."
      sleep 5
    done

    if [ $COUNT -eq $RETRIES ]; then
      echo "❌ Erro: Não foi possível criar/atualizar PR após $RETRIES tentativas."
      exit 1
    fi
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}