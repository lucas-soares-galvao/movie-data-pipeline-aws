name: Auto PR Pipeline

on:
  workflow_call:
    inputs:
      github-ref-name:
        description: 'Branch atual'
        required: true
        type: string
    secrets:
      GITHUB_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔍 Descobrir destino do PR
      - name: Define base branch
        id: branch
        run: |
          REF="${{ inputs.github-ref-name }}"

          if [[ "$REF" == feature/* ]]; then
            echo "base=develop" >> $GITHUB_OUTPUT
          elif [[ "$REF" == "develop" ]]; then
            echo "base=release" >> $GITHUB_OUTPUT
          elif [[ "$REF" == "release" ]]; then
            echo "base=main" >> $GITHUB_OUTPUT
          else
            echo "Branch não suportada"
            exit 1
          fi

      # (Opcional) Terraform validate
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Validate
        run: |
          cd infra
          terraform init -backend=false
          terraform validate

      # 🔀 Criar ou atualizar PR
      - name: Create or Update PR
        run: |
          BASE=${{ steps.branch.outputs.base }}
          HEAD=${{ inputs.github-ref-name }}

          PR_NUMBER=$(gh pr list --base "$BASE" --head "$HEAD" --json number --jq '.[0].number // ""')

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --base "$BASE" \
              --head "$HEAD" \
              --title "Auto PR: $HEAD → $BASE" \
              --body "PR criado automaticamente."
          else
            gh pr edit "$PR_NUMBER" \
              --title "Auto PR: $HEAD → $BASE" \
              --body "PR atualizado automaticamente."
            echo "PR já existente: #$PR_NUMBER"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}